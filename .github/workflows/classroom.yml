name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Ejercicio 3 - Sueldo
      id: ejercicio-3-sueldo
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Ejercicio 3 - Sueldo
        setup-command: javac -encoding UTF-8 src/practicacalificada01/Pregunta03.java
        command: java -cp src practicacalificada01.Pregunta03
        input: |-
          40
          45
        expected-output: '2000'
        comparison-method: contains
        timeout: 10
        max-score: 6
    - name: Ejercicio 4 - Areas
      id: ejercicio-4-areas
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Ejercicio 4 - Areas
        setup-command: javac -encoding UTF-8 src/practicacalificada01/Pregunta04.java
        command: java -cp src practicacalificada01.Pregunta04
        input: |-
          1
          5
        expected-output: '78.54'
        comparison-method: contains
        timeout: 10
        max-score: 6
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        EJERCICIO-3-SUELDO_RESULTS: "${{steps.ejercicio-3-sueldo.outputs.result}}"
        EJERCICIO-4-AREAS_RESULTS: "${{steps.ejercicio-4-areas.outputs.result}}"
      with:
        runners: ejercicio-3-sueldo,ejercicio-4-areas
